<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoorthi | A Celebration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Manrope:wght@200;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>

    <div class="noise"></div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="orb orb-1 floating"></div>
    <div class="orb orb-2 floating"></div>
    <div class="orb orb-3 floating"></div>

    <main id="smooth-wrapper">
        <div id="smooth-content">

            <section id="phase1" class="viewport-section active">
                <div class="content-wrapper">
                    <p class="subtitle fade-up">01 — The Beginning</p>
                    <h1 class="title fade-up">Dr. Spoorthi</h1>
                    <p class="quote fade-up">"Some friendships bloom like the rarest flora, defying gravity and time."</p>
                    <div class="magnetic-wrap fade-up">
                        <button class="magnetic-btn" onclick="transitionToPhase(2)">
                            <span>Open Gift</span>
                        </button>
                    </div>
                </div>
            </section>

            <section id="phase2" class="viewport-section hidden">
                <div class="content-wrapper">
                    <p class="subtitle">02 — The Essence</p>
                    <div class="glass-monolith floating-slow">
                        <h2 class="cinematic-text">You are extraordinary.</h2>
                        <p class="message-text">May your smile outshine the stars, and your dreams blossom with the wild, untamed beauty of nature itself.</p>
                        <div class="magnetic-wrap mt-2">
                            <button class="magnetic-btn" onclick="transitionToPhase(3)">
                                <span>Celebrate</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="phase3" class="viewport-section hidden">
                <div class="content-wrapper">
                    <p class="subtitle">03 — The Wish</p>
                    <div class="minimal-cake floating">
                        <div class="flame" onclick="blowOut()"></div>
                        <div class="candle-stick"></div>
                        <div class="cake-base"></div>
                    </div>
                    <h1 id="finale-text" class="title hidden-text">Happy Birthday.</h1>
                </div>
            </section>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
