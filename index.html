<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Bye</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #ff6ec4, #7873f5, #4ade80);
      background-size: 600% 600%;
      animation: backgroundShift 10s ease infinite;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 5em;
      background: linear-gradient(90deg, #fff, #ffeb3b, #ff9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
      opacity: 0;
      transform: translateY(50px);
      animation: fadeSlideIn 3s forwards;
    }

    @keyframes fadeSlideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes backgroundShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Fade out after 6s */
    h1.fadeOut {
      animation: fadeOut 2s forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: scale(0.8);
      }
    }
  </style>
</head>
<body>
  <h1 id="message">Good Bye...</h1>

  <script>
    // Trigger fade out after 6 seconds
    setTimeout(() => {
      document.getElementById("message").classList.add("fadeOut");
    }, 6000);
  </script>
</body>
</html>
